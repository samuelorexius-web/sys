name: Build Android .so

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Compile _pluning_core.c to .so
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          CC="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          
          echo "Compilateur: $CC"
          
          $CC -shared -fPIC -O3 -o _pluning_core.so src/_pluning_core.c -lm
          
          echo "=== Build Result ==="
          ls -lh _pluning_core.so
          file _pluning_core.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: _pluning_core_android_arm64
          path: _pluning_core.so
          retention-days: 30