name: Build pluning.py Android

on:
  workflow_dispatch:
  push:
    paths:
      - "_pluning_core.c"
      - "pluning.py"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get Python headers
        run: |
          # Les headers du système Python 3.12 sont compatibles pour la compilation
          INCLUDE_DIR=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          echo "PYTHON_INCLUDE=$INCLUDE_DIR" >> $GITHUB_ENV
          echo "Headers : $INCLUDE_DIR"
          ls "$INCLUDE_DIR/Python.h"

      - name: Compile _pluning_core.so (aarch64-android)
        run: |
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"

          $CC \
            -shared -fPIC -O3 -ffast-math \
            -o _pluning_core.so \
            _pluning_core.c \
            -I"$PYTHON_INCLUDE" \
            -lm

          echo "✓ Compilé :"
          ls -lh _pluning_core.so
          file _pluning_core.so

      - name: Encoder .so en base64 et injecter dans pluning.py
        run: |
          python3 - << 'PYEOF'
          import base64, hashlib

          with open("_pluning_core.so", "rb") as f:
              raw = f.read()

          b64 = base64.b64encode(raw).decode()
          h   = hashlib.md5(raw).hexdigest()[:8]

          print(f"Taille .so : {len(raw):,} bytes")
          print(f"Base64     : {len(b64):,} chars")
          print(f"MD5        : {h}")

          with open("pluning.py", "r", encoding="utf-8") as f:
              content = f.read()

          MARKER = "_EMBEDDED_SO = None   # ← coller ici la string base64 après compilation"
          NEW    = f'_EMBEDDED_SO = "{b64}"  # aarch64-android md5:{h}'

          if MARKER not in content:
              print("ERREUR : marqueur introuvable dans pluning.py")
              exit(1)

          content = content.replace(MARKER, NEW)

          with open("pluning_android.py", "w", encoding="utf-8") as f:
              f.write(content)

          print("✓ pluning_android.py prêt !")
          PYEOF

      - name: Upload pluning_android.py
        uses: actions/upload-artifact@v4
        with:
          name: pluning_android_ready
          path: pluning_android.py
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ pluning.py Android prêt !" >> $GITHUB_STEP_SUMMARY
          echo "Télécharge **pluning_android_ready**, renomme en \`pluning.py\`, copie sur ton téléphone." >> $GITHUB_STEP_SUMMARY
